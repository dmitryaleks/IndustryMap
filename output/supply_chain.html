<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Semiconductor Supply Chain Map</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e2e8f0;
       display: flex; height: 100vh; overflow: hidden; }

/* ── Sidebar ────────────────────────────────────────────────────── */
#sidebar {
  width: 270px; min-width: 270px; background: #1a1d27; border-right: 1px solid #2d3148;
  display: flex; flex-direction: column; overflow: hidden; z-index: 20;
}
#sidebar h1 { font-size: 13px; font-weight: 700; color: #94a3b8;
               padding: 14px 16px 10px; border-bottom: 1px solid #2d3148;
               text-transform: uppercase; letter-spacing: .08em; }
.filter-section { padding: 10px 14px; border-bottom: 1px solid #2d3148; }
.filter-section h2 { font-size: 11px; color: #64748b; text-transform: uppercase;
                      letter-spacing: .07em; margin-bottom: 8px; }
.filter-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; cursor: pointer; }
.filter-row input[type=checkbox] { accent-color: #6366f1; cursor: pointer; }
.filter-row label { font-size: 12px; color: #cbd5e1; cursor: pointer; flex: 1; }
.dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.legend-score { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.legend-score .ring { width: 14px; height: 14px; border-radius: 50%;
                        border: 3px solid; background: transparent; flex-shrink: 0; }
.legend-score label { font-size: 12px; color: #cbd5e1; }
#stats { padding: 10px 14px; font-size: 11px; color: #64748b; margin-top: auto; }
#stats span { display: block; margin-bottom: 3px; }

/* ── Detail panel ───────────────────────────────────────────────── */
#detail-panel {
  width: 0; min-width: 0; overflow: hidden;
  background: #141720; border-right: 1px solid #2d3148;
  transition: width 0.28s cubic-bezier(0.4,0,0.2,1);
  display: flex; flex-direction: column; z-index: 10;
}
#detail-panel.open { width: 440px; min-width: 440px; }
#dp-inner { width: 440px; height: 100%; overflow-y: auto; display: flex; flex-direction: column; }

/* scrollbar */
#dp-inner::-webkit-scrollbar { width: 5px; }
#dp-inner::-webkit-scrollbar-track { background: #0f1117; }
#dp-inner::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 3px; }

#dp-header {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 16px 16px 12px; border-bottom: 1px solid #2d3148;
  position: sticky; top: 0; background: #141720; z-index: 2;
}
#dp-header .title-block { flex: 1; min-width: 0; }
#dp-header h2 { font-size: 15px; font-weight: 700; color: #f1f5f9;
                 white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#dp-header .sub { font-size: 11px; color: #64748b; margin-top: 2px; }
#dp-close { background: none; border: none; color: #64748b; font-size: 18px;
              cursor: pointer; padding: 0 2px; line-height: 1; flex-shrink: 0; }
#dp-close:hover { color: #e2e8f0; }

/* card sections */
.card-section { padding: 14px 16px; border-bottom: 1px solid #1e2233; }
.card-section h3 { font-size: 10px; text-transform: uppercase; letter-spacing: .09em;
                    color: #475569; margin-bottom: 10px; font-weight: 600; }

/* score bar */
.score-bar-wrap { margin-bottom: 10px; }
.score-num { font-size: 28px; font-weight: 800; line-height: 1; }
.score-meta { font-size: 11px; color: #64748b; margin-top: 2px; margin-bottom: 8px; }
.bar-bg { height: 8px; background: #1e2233; border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width .4s; }
.conf-badge { display: inline-block; padding: 2px 8px; border-radius: 10px;
               font-size: 10px; font-weight: 600; text-transform: uppercase;
               letter-spacing: .06em; margin-top: 6px; }
.conf-high   { background: #14532d; color: #86efac; }
.conf-med    { background: #1e3a5f; color: #93c5fd; }
.conf-low    { background: #431407; color: #fed7aa; }
.conf-vlow   { background: #1c1917; color: #a8a29e; }

/* dim grid */
.dim-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-top: 8px; }
.dim-cell { background: #1a1d27; border-radius: 6px; padding: 7px 8px; cursor: default; }
.dim-cell .dim-label { font-size: 9px; color: #64748b; text-transform: uppercase;
                        letter-spacing: .07em; margin-bottom: 3px; }
.dim-cell .dim-score { font-size: 13px; font-weight: 700; color: #e2e8f0; }
.dim-cell .dim-max { font-size: 10px; color: #475569; }
.dim-bar-bg { height: 3px; background: #2d3148; border-radius: 2px; margin: 5px 0 6px; overflow: hidden; }
.dim-bar-fill { height: 100%; border-radius: 2px; transition: width .4s; }
.dim-subs { border-top: 1px solid #2d3148; margin-top: 4px; padding-top: 4px; }
.sub-row { display: flex; justify-content: space-between; align-items: center;
            font-size: 9px; margin-bottom: 2px; gap: 4px; }
.sub-key { color: #475569; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sub-val { color: #94a3b8; font-weight: 700; flex-shrink: 0; }
.dim-note { font-size: 9px; color: #334155; margin-top: 4px; line-height: 1.4; font-style: italic; }

/* thesis */
.thesis-text { font-size: 12px; color: #cbd5e1; line-height: 1.65; }

/* financial table */
.fin-table { width: 100%; border-collapse: collapse; }
.fin-table tr td { padding: 4px 2px; font-size: 12px; border-bottom: 1px solid #1e2233; }
.fin-table tr:last-child td { border-bottom: none; }
.fin-table td:first-child { color: #64748b; width: 54%; }
.fin-table td:last-child { color: #f1f5f9; font-weight: 600; text-align: right; }

/* sc list */
.sc-group { margin-bottom: 10px; }
.sc-group-label { font-size: 10px; color: #475569; text-transform: uppercase;
                   letter-spacing: .07em; margin-bottom: 4px; }
.sc-list { display: flex; flex-wrap: wrap; gap: 5px; }
.sc-chip { background: #1a1d27; border: 1px solid #2d3148; border-radius: 12px;
            padding: 3px 10px; font-size: 11px; color: #94a3b8; cursor: pointer;
            transition: background .15s, color .15s; white-space: nowrap; }
.sc-chip:hover { background: #6366f1; color: #fff; border-color: #6366f1; }

/* website link */
.website-link { font-size: 12px; color: #6366f1; text-decoration: none; word-break: break-all; }
.website-link:hover { text-decoration: underline; }
.desc-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin-top: 6px; }

/* ── Graph area ─────────────────────────────────────────────────── */
#graph { flex: 1; position: relative; overflow: hidden; }
svg { width: 100%; height: 100%; }

/* tooltip */
.tooltip {
  position: absolute; background: #1a1d27ee; border: 1px solid #2d3148;
  border-radius: 8px; padding: 10px 13px; font-size: 12px; color: #e2e8f0;
  pointer-events: none; opacity: 0; transition: opacity .15s;
  max-width: 240px; z-index: 100;
}
.tooltip .tt-name { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
.tooltip .tt-row { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 2px; }
.tooltip .tt-key { color: #64748b; }
.tooltip .tt-val { color: #f1f5f9; font-weight: 600; }
.tooltip .tt-score { font-size: 15px; font-weight: 800; margin-top: 5px; }
.tooltip .tt-hint { font-size: 10px; color: #475569; margin-top: 5px; }
</style>
</head>

cored 2/3 sub-dimensions; pro-rata rescaled to 10"}, "E": {"score": 6.0, "max": 10, "subs": {"E1_analystConsensus": 3, "E2_capacityExpansion": 1, "E3_policyTailwinds": 2}, "note": "All sub-dimensions scored"}, "F": {"score": 5, "max": 10, "subs": {"F1_forexSensitivity": 1, "F2_customerConcentration": 2, "F3_geopoliticalRisk": 2}, "note": "Scored from isForexSensitive, client arrays, descriptions"}}, "investmentThesis": "", "marketCapInYen": 1180000000000, "latestPriceYen": 1842, "weekHigh52": 4186, "weekLow52": 1540, "PER": 8.85, "forwardPER": null, "PBR": 1.41, "EPS": 188.36, "ROE": 7.0, "dividendYield": 3.26, "revenueGrowth": 7.01, "OPM": 11.5, "foreignOwnership": null, "chinaRevenue": null, "hasBuyback": null, "analystBuy": 2, "analystHold": 4, "analystSell": 1, "forexSensitive": true, "suppliers": [], "clients": [{"id": "CMP-0017", "name": "TSMC", "label": ""}, {"id": "CMP-0018", "name": "Samsung Electronics", "label": ""}, {"id": "CMP-0004", "name": "Tokyo Electron", "label": ""}, {"id": "CMP-0003", "name": "SCREEN Holdings", "label": ""}], "competitors": [], "partners": [], "ecosystem": []}, "CMP-0038": {"id": "CMP-0038", "name": "Gun Ei Chemical", "ticker": "4229.T", "country": "Japan", "industry": "Semiconductor Materials", "wave": 3, "website": "https://www.gunei-chemical.co.jp/", "description": "Japan's dominant supplier of novolac-type phenol-formaldehyde resins (RESITOP brand) used as base polymers in photoresists for semiconductor manufacturing. Serves every lithography node from g-line (436nm) through i-line (365nm), KrF (248nm), and ArF (193nm), making it — by its own claim — the world's only supplier with a continuous lineup across all commercial wavelengths. Anchor customers Tokyo Ohka Kogyo and Shin-Etsu Chemical both hold equity stakes in Gun Ei, underscoring the depth of these long-term supply relationships. Beyond photoresist materials, Gun Ei is the world's sole commercial producer of phenolic resin fiber 'Kainol' (activated carbon fiber for solvent recovery and fire protection) and holds the global Milex brand for friction-material binder resins used in automotive brakes. Operates domestic factories in Gunma (HQ), Shiga, and Iwate; overseas production subsidiaries in Thailand (Thai GCI Resitop) and India. Wholly-owned subsidiary Tohoku Uloid Industrial Co., Ltd. (acquired from Mitsui Chemicals, 2014) self-produces formaldehyde, providing vertical integration in a key raw material. A ¥3.5 billion photoresist resin factory at the Gunma site is completing in FY2026, representing 30%+ additional capacity on top of a prior expansion. Medium-term plan (GCI 2030) targets ¥40B revenue and ¥4B operating profit by FY2031, from ¥30.5B / ¥2.3B in FY2025. Net cash position of ¥10.2B (22% of market cap) and PBR 0.64x represent a significant valuation cushion despite the stock's +88% gain over the past 12 months.", "finalScore": 78.9, "rawComposite": 83.0, "confidence": "High", "confidenceMult": 0.95, "dataCoverage": 88.0, "researchComplete": 88.0, "dims": {"A": {"score": 23, "max": 30, "subs": {"A1_PER_discount": 6, "A2_fwdPER_discount": 4, "A3_PBR_discount": 9, "A4_earningsYield": 4}, "note": "PER 17.6x: modest discount vs semiconductor materials sector avg ~25x. fwd PER 19.9x fairly full on guidance EPS. PBR 0.64x with net cash 10.2B yen (22% of mkt cap) — deep discount to book, score 9. Earnings yield 5.7%."}, "B": {"score": 24, "max": 25, "subs": {"B1_marketShare": 8, "B2_switchingCosts": 7, "B3_techDiff": 5, "B4_chainCentrality": 4}, "note": "Dominant in g/i-line novolac (duopoly with Maruzen); world's only continuous all-wavelength lineup claim. Re-qualification switching costs extremely high (6-12 months). Unique Kainol monopoly + GPI polyimide. Cross-confirmed anchor customers via equity cross-holdings (TOK 1.87%, Shin-Etsu 3.66%)."}, "C": {"score": 12, "max": 15, "subs": {"C1_revenueGrowth": 2, "C2_operatingMargin": 4, "C3_ROE": 2, "C4_AIexposure": 4}, "note": "Revenue growth muted (+0.78% FY2025) but Q3 FY2026 op income +31.4% YoY. Op margin 7.51% with 10% target by 2031. ROE 3.86% suppressed by net cash — not poor underlying returns. Strong AI semiconductor exposure via photoresist polymers + new 3.5B factory."}, "D": {"score": 8, "max": 10, "subs": {"D1_foreignOwnershipGap": 3, "D2_floatDynamics": 2, "D3_priceVs52W": 3}, "note": "Foreign ownership 3.6% vs Japan avg ~29% — massive gap, significant international re-rating potential. Float 53% reasonable. Price at 98.5% of 52W high (5180 yen hit Feb 12 2026) — exceptional momentum. Stockopedia 99/100 quant rank."}, "E": {"score": 9, "max": 10, "subs": {"E1_analystConsensus": 2, "E2_capacityExpansion": 4, "E3_policyTailwinds": 3}, "note": "Limited formal sell-side coverage; analyst avg target 4000 yen now below market price 5100. 3.5B new Gunma factory (FY2026 completion) + prior 30% expansion + India doubling. Indirect JASM/Rapidus/METI beneficiary via supply chain (TOK confirmed TSMC photoresist supplier)."}, "F": {"score": 7, "max": 10, "subs": {"F1_forexSensitivity": 1, "F2_customerConcentration": 3, "F3_geopoliticalRisk": 3}, "note": "Forex sensitive confirmed; Thai + India + US operations add currency exposure. Customer concentration moderate — 5+ named customers (TOK, Shin-Etsu, JSR, Fujifilm, Sumitomo). Low direct China revenue for electronics but Kainol has China cyclical risk. Phenol supplier risk: Mitsui Ichihara closure FY2026."}}, "investmentThesis": "Gun Ei Chemical (4229.T) is the quiet anchor of Japan's photoresist supply chain — a Gunma specialty chemical house that has entrenched itself as the dominant supplier of novolac-type phenol resins used as base polymers in photoresists for semiconductor manufacturing. Its strategic position is validated by the most revealing possible signal: two of Japan's largest photoresist makers, Tokyo Ohka Kogyo (TOK, 1.87% stake) and Shin-Etsu Chemical (3.66% stake), each hold equity stakes in Gun Ei — a cross-shareholding structure that in Japan signals a deep, long-term commercial relationship. TOK's landmark OFPR-800 g-line resist, which became the global standard for 64K DRAM production in the early 1980s, was formulated on Gun Ei's RESITOP novolac, cementing a 40-year supply relationship that underpins both companies' global reputations.\n\nSTRUCTURAL MOAT — PHOTORESIST POLYMERS:\nGun Ei operates in a duopoly with Maruzen Petrochemical in the Japanese photoresist polymer market, with Gun Ei dominant in g-line and i-line novolac and Maruzen strongest in advanced-node (KrF/ArF/EUV) chemically amplified resist polymers. For g-line and i-line photoresist — still used extensively for non-critical layer patterning even on the most advanced logic and memory fabs — Gun Ei claims to be the sole global supplier with a continuous product lineup across all commercial wavelengths. Re-qualification of photoresist base polymers is a lengthy (6-12 month), resource-intensive process at semiconductor fabs; once qualified, suppliers do not get switched. For its key photoresist resin products, Gun Ei achieves metal ion purity at sub-ppb levels (Na, Fe, Cr, Ni), a quality standard extraordinarily difficult to replicate without years of accumulated process knowledge and certified equipment.\n\nUNIQUE FRANCHISE — KAINOL FIBER:\nGun Ei is the world's sole commercial producer of Kainol — a phenol resin-derived activated carbon fiber with the highest limiting oxygen index (LOI) of any organic textile fiber, meaning it is intrinsically and permanently flame-resistant without surface treatment. This monopoly position, marketed globally through subsidiary Kynol Inc., provides pricing power in niche industrial and protective equipment markets. While the current segment faces cyclical headwinds (Chinese solvent recovery demand weakness), the technology moat is unassailable — no competitor has commercialized a competing phenol fiber product.\n\nVERTICAL INTEGRATION AND RAW MATERIAL SECURITY:\nGun Ei secured formaldehyde self-sufficiency through its 2014 acquisition of Tohoku Uloid Industrial Co., Ltd. from Mitsui Chemicals — bringing in-house a critical raw material that was previously an external dependency. This subsidiary (Iwate Prefecture) operates 7 reaction vessels (5-30m3) producing formaldehyde in multiple concentrations. For phenol, the other primary monomer, Gun Ei sources domestically from Mitsui Chemicals (Ichihara) and Mitsubishi Chemical (Kashima). Mitsui's announced Ichihara plant closure (by FY2026) is a near-term raw material risk, partially mitigated by an emerging Mitsui-Mitsubishi joint supply arrangement (January 2025 announcement). The Milex friction resin business, acquired from Mitsui Fine Chemicals in July 2022 (all patents, know-how, and global trademarks), added a profitable industrial channel with global distribution spanning Japan, South Korea, China, Thailand, Taiwan, North America, and Europe.\n\nCAPACITY INVESTMENT CYCLE — AHEAD OF AI DEMAND:\nGun Ei initiated a deliberate photoresist polymer capacity build-out: a first-phase expansion (completed FY2024) added ~30% capacity; a second ¥3.5 billion Gunma factory (completing FY2026) adds a further step-change. President Kiichiro Arita stated explicitly that 'looking at future growth, current equipment cannot keep up,' linking the investment to AI-driven semiconductor demand acceleration. This positions Gun Ei ahead of demand from Japan's semiconductor renaissance — TSMC's JASM Kumamoto fab (volume production), Kioxia-WD NAND expansion, and Rapidus 2nm (Chitose, Hokkaido, targeting 2027 pilot). Gun Ei supplies polymers to photoresist makers (TOK, Shin-Etsu, JSR) who supply these fabs — 1-2 layers upstream from the direct capacity wave. Q3 FY2026 cumulative operating income of ¥2.23B already reached 96.8% of full-year guidance with one quarter remaining, implying a meaningful full-year beat.\n\nVALUATION AND CAPITAL STRUCTURE:\nDespite a +88% stock return over the past 12 months (10-year high of ¥5,180 on Feb 12, 2026), the valuation retains key attractions. PBR of 0.64x means the stock trades well below book value — unusual for a profitable company with a clear technology moat. Net cash of ¥10.21 billion represents 22% of the entire market capitalization, implying the operating business is valued at only ~¥35.7 billion on a cash-adjusted basis. Equity ratio is 81.2% — the balance sheet is fortress-like. Dividend ¥100/share (payout ~35%) is well-covered. The 26.25% treasury share position provides ammunition for future buybacks (most recently the 2019-2020 ¥750M program executed at avg ¥2,505/share — a 100%+ gain vs current price on those repurchased shares).\n\nINTERNATIONAL UNDERFOLLOWING:\nForeign ownership stands at just 3.6% — a fraction of the 28-30% average for Nikkei 225 constituents. Gun Ei Chemical does not appear in any major global semiconductor materials ETF. Its Stockopedia quantitative rank of 99/100 ('Super Stock') signals an extreme gap between fundamental quality and international investor awareness. Formal sell-side coverage is sparse; analyst consensus target ~¥4,000 has been comprehensively exceeded by the market (current ¥5,100), suggesting fundamental analysts have not kept pace with the strategic re-rating underway. This low foreign ownership creates a structural re-rating catalyst.\n\nMEDIUM-TERM GROWTH ROADMAP (GCI 2030 PLAN):\nAnnounced June 2025: Revenue target ¥40B by FY2031 (from ¥30.5B; +31% / ~4.6% CAGR), Operating profit ~¥4B (from ¥2.3B; +74%). Two growth pillars: (1) Electronic materials — AI/semiconductor capex via RESITOP photoresist polymers and GPI reactive polyimide for semiconductor packaging; (2) Environmental materials — Kainol fiber recovery as Chinese solvent recovery market stabilizes and energy/ESG applications emerge. India (GCI India capacity doubling) and North America (GCI America Milex) provide international supplement.\n\nRISKS TO MONITOR:\n(1) ROE 3.86% is suppressed by the large net cash balance — capital allocation discipline is critical; the company must either accelerate profitable growth investment or increase shareholder returns via buybacks/special dividends. (2) Flat FY2025 revenue (+0.78%) and declining operating income (-16% from FY2024's spike) may disappoint investors expecting linear progress. (3) Mitsui Chemicals Ichihara phenol plant closure by FY2026 introduces a raw material supply chain risk requiring careful navigation. (4) Kainol segment China exposure (solvent recovery cyclical weakness) creates revenue headwind. (5) Automotive resin segment (Milex/industrial) faces headwinds from Japan OEM market share losses in China and weak global auto demand. (6) Stock's rapid re-rating (+88% in 12 months) means a return to discount valuation would require disappointing earnings or broader risk-off in Japanese small-caps.", "marketCapInYen": 45890000000, "latestPriceYen": 5100, "weekHigh52": 5180, "weekLow52": 2561, "PER": 17.6, "forwardPER": 19.9, "PBR": 0.64, "EPS": 289.5, "ROE": 3.86, "dividendYield": 1.96, "revenueGrowth": 0.78, "OPM": 7.51, "foreignOwnership": 3.6, "chinaRevenue": 5.0, "hasBuyback": false, "analystBuy": null, "analystHold": null, "analystSell": null, "forexSensitive": true, "suppliers": [], "clients": [{"id": "CMP-0033", "name": "Tokyo Ohka Kogyo", "label": ""}, {"id": "CMP-0034", "name": "JSR", "label": ""}, {"id": "CMP-0024", "name": "Shin-Etsu Chemical", "label": ""}, {"id": "CMP-0040", "name": "FUJIFILM Holdings", "label": ""}, {"id": "CMP-0046", "name": "Sumitomo Chemical", "label": ""}], "competitors": [], "partners": [], "ecosystem": []}, "CMP-0039": {"id": "CMP-0039", "name": "Niterra", "ticker": "5334.T", "country": "Japan", "industry": "Semiconductor Components", "wave": 3, "website": "https://www.niterragroup.com/", "description": "Major ceramic components manufacturer. Supplies electrostatic chucks and ceramic parts for semiconductor manufacturing equipment through subsidiary NTK Ceratec. Renamed from NGK Spark Plug in 2023.", "finalScore": 51.2, "rawComposite": 51.2, " yo Electron", "label": ""}, {"id": "CMP-0003", "name": "SCREEN Holdings", "label": ""}, {"id": "CMP-0017", "name": "TSMC", "label": ""}, {"id": "CMP-0018", "name": "Samsung Electronics", "label": ""}], "competitors": [], "partners": [], "ecosystem": []}, "CMP-0042": {"id": "CMP-0042", "name": "PILLAR", "ticker": "6490.T", "country": "Japan", "industry": "Semiconductor Equipment", "wave": 3, "website": "https://www.pillar.co.jp/", "description": "World #1 fluororesin fittings maker for semiconductor cleaning equipment (90%+ global share). Two segments: Electronic Equipment (67% of sales, PILAFLON fluororesin fittings/pumps/valves/tubing for semiconductor wet processes) and Industrial Equipment (33%, mechanical seals/gaskets/packing for petrochemical/power/automotive). Renamed from Nippon Pillar Packing in June 2024 at 100th anniversary. Super 300 (S-300) fitting standard is the de facto industry standard — Entegris licenses PILLAR fittings. Revenue FY2025/3: 58.0B JPY. Overseas sales ~30% direct, >60% including indirect exports via equipment makers. Acquired Tanken Seal Seiko (carbon seals) in Apr 2023 for 6.6B JPY. Malaysia subsidiary established Oct 2025.", "finalScore": 72.0, "rawComposite": 72.0, "confidence": "High", "confidenceMult": 1.0, "dataCoverage": 100.0, "researchComplete": 100.0, "dims": {"A": {"score": 20.0, "max": 30, "subs": {"A1_PER_discount": 10, "A3_PBR_discount": 4, "A4_earningsYield": 2}, "note": "PER 21.54 vs G1 median 31.59 (0.68x); PBR 2.42 vs 2.49 (0.97x); EY spread 3.1%. Stock rallied +119% in 1yr, reducing valuation discount. Scored 3/4; pro-rata rescaled to 30"}, "B": {"score": 24, "max": 25, "subs": {"B1_marketShare": 10, "B2_switchingCosts": 5, "B3_techDiff": 5, "B4_chainCentrality": 4}, "note": "90%+ world share in semi cleaning fittings (monopoly). S-300 fitting is de facto standard — Entegris licenses it. 14 client edges in graph (SCREEN, TEL, Ebara, Shibaura, Kokusai, CKD, Samco, TSMC, Samsung, Intel, SK Hynix, SMIC, Hua Hong, SEMES)"}, "C": {"score": 8.0, "max": 15, "subs": {"C1_revenueGrowth": 1, "C2_operatingMargin": 3, "C3_ROE": 1, "C4_AIexposure": 3}, "note": "Rev growth -1.05% (FY2025 trough, Q3 FY2026 +8.14% YoY recovery). OPM 19.85% vs G1 14.9% (1.33x). ROE 11.78% (below 12% threshold). AI/HPC driving cleaning equipment demand"}, "D": {"score": 7.0, "max": 10, "subs": {"D1_foreignOwnershipGap": 5, "D2_floatDynamics": 2, "D3_priceVs52W": 0}, "note": "Foreign ownership 21.28% vs expected 45% for B>=18 company (gap 23.7pp). Active buyback (51.2k shares completed, 1M authorized). Trading at 99% of 52W high"}, "E": {"score": 8.0, "max": 10, "subs": {"E1_analystConsensus": 2, "E2_capacityExpansion": 3, "E3_policyTailwinds": 3}, "note": "2 Buy / 0 Hold / 0 Sell, target 8,215 JPY (1.3% upside — analysts lagging rally). Malaysia subsidiary Oct 2025. Japan semi policy support"}, "F": {"score": 5, "max": 10, "subs": {"F1_forexSensitivity": 1, "F2_customerConcentration": 2, "F3_geopoliticalRisk": 2}, "note": "30% direct overseas (>60% incl indirect). SCREEN 16.6% of rev. China ~10% via subsidiaries"}}, "investmentThesis": "THE HIDDEN MONOPOLY: PILLAR Corporation holds arguably the most under-appreciated monopoly in the global semiconductor supply chain: 90%+ world market share in fluororesin fittings for semiconductor wet cleaning equipment. The Super 300 (S-300) fitting, PILLAR's flagship product, has become the de facto industry standard — so dominant that Entegris (ENTG, $17B market cap), the world's leading semiconductor fluid handling company, licenses PILLAR's S-300 technology rather than developing a competing standard. When a competitor of that scale chooses to license rather than compete, it is the ultimate validation of a monopoly position. Every wet cleaning, etching, and CMP tool shipped by SCREEN, Tokyo Electron, Lam Research, Applied Materials, or Ebara globally requires PILLAR's fluororesin fittings, valves, pumps, and tubing. The company earns a near-perfect moat score (B=24/25).\n\nWHY FLUORORESIN FITTINGS MATTER: Semiconductor wet processes use ultra-aggressive chemicals — hydrofluoric acid, sulfuric acid, hydrogen peroxide, ammonia — at extreme concentrations and temperatures. Fluororesin (PFA/PTFE) fittings are the only materials that can withstand these environments without contaminating the wafer. At sub-7nm geometries, even parts-per-trillion contamination from fittings or tubing can destroy chip yields. PILLAR has spent 100 years (founded 1924, originally as Nippon Pillar Packing) perfecting the purity and dimensional precision of fluororesin components. The S-300 fitting system incorporates PILLAR's proprietary molding, welding, and surface finishing technologies that achieve semiconductor-grade cleanliness. Requalification of alternative fittings at a live fab would require 12-18 months and carry unacceptable contamination risk — switching costs are effectively infinite for existing tool platforms.\n\nCLIENT ECOSYSTEM: PILLAR serves the semiconductor ecosystem through two channels. First, as an OEM supplier to equipment makers: SCREEN Holdings (CMP-0003, largest customer at 16.6% of revenue / 9.65B JPY), Tokyo Electron (CMP-0004), Ebara Corporation (CMP-0036), Shibaura Mechatronics (CMP-0059), Kokusai Electric (CMP-0011), CKD (CMP-0043), and Samco (CMP-0060) all embed PILLAR components into their tools. Second, through a global subsidiary network that supplies maintenance and replacement parts directly to fabs: PILLAR Taiwan (Kaohsiung factory, serving TSMC), PILLAR Korea (Seoul, serving Samsung/SK Hynix/SEMES), PILLAR Shanghai + Pillar Technology Chuzhou (serving SMIC/Hua Hong), and PILLAR America (Fremont CA, serving Intel). Additionally, through the Entegris licensing relationship, PILLAR fittings are embedded in Applied Materials, Lam Research, and KLA tools — meaning PILLAR's total addressable reach extends far beyond its direct client list. The company has 14 mapped client relationships in the supply chain graph.\n\nSEGMENT STRUCTURE: The Electronic Equipment segment (67% of consolidated sales) is the semiconductor pure-play — PILAFLON fluororesin fittings, pumps, valves, and tubing for wet processes. This segment drives the investment thesis. The Industrial Equipment segment (33%) produces mechanical seals, gaskets, and packing for petrochemical, power generation, and automotive applications. This segment provides earnings stability and cyclical diversification. In April 2023, PILLAR acquired Tanken Seal Seiko for 6.6B JPY, adding carbon-based mechanical seal capabilities and strengthening the industrial business. The dual-segment structure is an often-overlooked advantage: in semiconductor downturns, the industrial segment floors the earnings decline.\n\nFINANCIAL PROFILE: PILLAR's profitability metrics stand out among G1 Equipment peers. Operating margin at 19.85% is 1.33x the G1 peer median of 14.9%, reflecting the pricing power of a monopoly supplier. ROE at 11.78% is solid though slightly below the 12% excellence threshold (depressed by conservative balance sheet management). The balance sheet carries a net cash position of 9.7B JPY (424 JPY/share, ~5% of market cap), providing downside protection. 10-year revenue CAGR of 10.34% and net profit CAGR of 15.37% demonstrate consistent compounding — the profit CAGR exceeding the revenue CAGR by 5pp reflects operating leverage from the monopoly position. FY2025/3 revenue was 58.0B JPY (-1.05% YoY), marking a cyclical trough. Q3 FY2026/3 showed +8.14% YoY recovery. FY2026 guidance has been revised upward: operating income +16.5%, dividend raised to 130 JPY (yield 1.60%).\n\nVALUATION — STILL CHEAP AFTER THE RALLY: The stock has rallied +119% over the past year (from 2,810 to 8,110 JPY), one of the strongest moves in the Japanese semiconductor supply chain. Despite this, PILLAR remains attractively valued relative to G1 Equipment peers: PER at 21.54x is a 32% discount to the G1 median of 31.59x — the deepest PER discount among monopoly-quality companies in our coverage. PBR at 2.42x is essentially at parity with the G1 median of 2.49x. Forward PER at 19.24x is even more compelling. The valuation discount persists because PILLAR was historically classified as an 'industrial seals' company, and many equity databases still categorize it under machinery or industrial components rather than semiconductor equipment. This misclassification suppresses institutional discovery. The earnings yield spread of 3.1% over JGBs provides a reasonable margin of safety.\n\nFOREIGN OWNERSHIP GAP — THE PRIMARY CATALYST: At 21.28%, foreign institutional ownership is dramatically below the expected ~45% for a company with near-monopoly moat scores (B=24/25). This 23.7 percentage-point gap is the single strongest undervaluation signal in our framework. For comparison, SCREEN Holdings has ~40% foreign ownership, Tokyo Electron has ~55%, and Advantest has ~60%. PILLAR's gap exists because: (1) it was a 'Nippon Pillar Packing' until its June 2024 rebrand — not exactly a name that screams semiconductor monopoly to foreign fund managers; (2) market cap at 185B JPY (~$1.2B) sits below the radar of many large-cap semiconductor funds; (3) equity databases frequently miscategorize it. As awareness grows, the structural bid from foreign institutions should provide sustained buying pressure. Free float at 74.9% is ample to absorb this demand.\n\nCAPACITY EXPANSION & GEOGRAPHIC REACH: PILLAR established a new Malaysia subsidiary in October 2025, its first manufacturing footprint in Southeast Asia, positioning for the growing semiconductor ecosystem in Malaysia (Intel Penang, Infineon Kulim, multiple OSAT facilities). Global subsidiaries now span Taiwan, Korea, China, USA, and Malaysia. This expansion directly tracks the geographic diversification of semiconductor manufacturing away from East Asian concentration.\n\nCATALYSTS: (1) Foreign ownership gap — 23.7pp of structural institutional buying potential, the strongest near-term catalyst. (2) Revenue recovery — Q3 FY2026 shows +8.14% YoY growth after the FY2025 trough, with full-year guidance revised upward. (3) AI/HPC capex boom — every AI accelerator (NVIDIA H100/B200, AMD MI300, custom ASICs) requires advanced fab capacity, which requires cleaning equipment, which requires PILLAR fittings. (4) Global fab buildout — TSMC Arizona/Kumamoto/Dresden, Intel Ohio/Germany, Samsung Taylor TX, Rapidus Chitose all need new cleaning tools equipped with PILLAR components. (5) Malaysia subsidiary (Oct 2025) unlocks Southeast Asian revenue. (6) Active buyback program — 1M shares authorized, 51.2k completed, signaling management's view that shares are undervalued. (7) Potential index inclusion or reclassification as 'semiconductor equipment' could trigger forced buying.\n\nRISKS: (1) SCREEN concentration — at 16.6% of revenue and growing (was 9% in FY2021), PILLAR is increasingly dependent on SCREEN's wet cleaning equipment sales trajectory. A SCREEN downturn would directly impact PILLAR. (2) Entegris licensing — while the licensing relationship validates the S-300 standard, it also means Entegris accumulates manufacturing know-how; a future termination of the license agreement could create a well-capitalized competitor, though S-300's installed base and switching costs make this a low-probability risk. (3) Chinese competition — PILLAR Shanghai and Chuzhou operations (~10% of revenue from China) face the risk of local Chinese fluororesin fitting makers developing competitive products as China's semiconductor self-sufficiency drive intensifies. ACM Research (Chinese/US cleaning equipment maker) is a growing customer but could eventually backward-integrate. (4) Forex sensitivity — with >60% of revenue tied to overseas semiconductor production (30% direct exports, remainder indirect via equipment makers), yen appreciation would compress margins. (5) Cyclicality — semiconductor equipment spending is inherently cyclical; the current AI capex boom will eventually normalize. (6) Raw material dependency — primary fluororesin supplier Daikin Industries could face supply disruptions or price increases.\n\nCONCLUSION: PILLAR is the highest-conviction name in our coverage universe. The combination of (a) a genuine monopoly position (90%+ share, S-300 de facto standard, Entegris license validation), (b) the largest foreign ownership gap among monopoly-quality companies (23.7pp), and (c) still-attractive valuation despite the rally (PER 21.5x at a 32% discount to peers) creates a rare convergence of moat, catalyst, and price. The 10-year net profit CAGR of 15.37%, 19.85% operating margin, and net cash balance sheet confirm operational excellence. The June 2024 corporate rebrand from 'Nippon Pillar Packing' to 'PILLAR Corporation' was a deliberate signal that management intends to reposition the company's identity toward its semiconductor business — this should accelerate institutional discovery. At the current score of 72.0/100, this is the top-ranked G1 Equipment company in our framework. Suitable for a high-conviction position with current entry or on pullbacks to 7,000 JPY (18x forward PER). The rally has reduced but not eliminated the opportunity; the foreign ownership catalyst alone could sustain further appreciation over 12-18 months. [Score: 72.0/100 | Confidence: High — 100% data coverage]", "marketCapInYen": 185000000000, "latestPriceYen": 8110, "weekHigh52": 8150, "weekLow52": 2810, "PER": 21.54, "forwardPER": 19.24, "PBR": 2.42, "EPS": 376.5, "ROE": 11.78, "dividendYield": 1.6, "revenueGrowth": -1.05, "OPM": 19.85, "foreignOwnership": 21.28, "chinaRevenue": 10, "hasBuyback": true, "analystBuy": 2, "analystHold": 0, "analystSell": 0, "forexSensitive": true, "suppliers": [], "clients": [{"id": "CMP-0004", "name": "Tokyo Electron", "label": ""}, {"id": "CMP-0003", "name": "SCREEN Holdings", "label": ""}, {"id": "CMP-0036", "name": "Ebara", "label": ""}, {"id": "CMP-0059", "name": "Shibaura Mechatronics", "label": ""}, {"id": " aysia, USA. Global EG-HF market ~$1.39B (2025), projected $1.87B by 2030.", "finalScore": 60.5, "rawComposite": 60.5, "confidence": "High", "confidenceMult": 1.0, "dataCoverage": 100.0, "researchComplete": 100.0, "dims": {"A": {"score": 7.5, "max": 30, "subs": {"A1_PER_discount": 2, "A3_PBR_discount": 2, "A4_earningsYield": 2}, "note": "PER 21.62 vs G2 median 17.0 (1.27x premium); PBR 1.39 vs 1.32 (1.05x); EY spread 3.1%. Stock rallied +42% in past year. Scored 3/4; pro-rata rescaled to 30"}, "B": {"score": 25, "max": 25, "subs": {"B1_marketShare": 10, "B2_switchingCosts": 5, "B3_techDiff": 5, "B4_chainCentrality": 5}, "note": "Perfect score. 12-nine purity HF — only Stella and Morita can achieve this globally. Irreplaceable duopoly. 10 fab clients in graph. Japan 2019 export controls proved strategic leverage"}, "C": {"score": 8.0, "max": 15, "subs": {"C1_revenueGrowth": 3, "C2_operatingMargin": 1, "C3_ROE": 1, "C4_AIexposure": 3}, "note": "FY2025/3 revenue +19.2% (corrected from -0.9% which was FY2026 guidance). OPM 12.0% (actual, was incorrectly 18% EBITDA) vs G2 15.19%. ROE 6.5% (recovered from 0.3% one-time impairment in FY2024/3). Target ROE 8%+ by FY2028/3"}, "D": {"score": 7.0, "max": 10, "subs": {"D1_foreignOwnershipGap": 4, "D2_floatDynamics": 3, "D3_priceVs52W": 0}, "note": "Foreign ownership 25.93% vs expected 45% for B>=18 (gap 19.1pp). Active buyback (100%+ TSR target in 4th MTMP). Free float ~57%. Trading at 89% of 52W high"}, "E": {"score": 7.0, "max": 10, "subs": {"E1_analystConsensus": 1, "E2_capacityExpansion": 3, "E3_policyTailwinds": 3}, "note": "1 analyst, Strong Buy but target 4,800 vs price 5,290 (stock exceeded target). Q3 OP progress 88.9% suggests upward guidance revision. Expanding capacity via China JVs"}, "F": {"score": 6, "max": 10, "subs": {"F1_forexSensitivity": 1, "F2_customerConcentration": 3, "F3_geopoliticalRisk": 2}, "note": "58% overseas sales. End-user fabs diversified (10 fabs). But 2 distributors (Maruzen Chemicals, Mitsubishi Chemical) are named top customers. China supply chain risk (fluorite sourcing, JV operations)"}}, "investmentThesis": "STRUCTURAL MOAT: Stella Chemifa operates in one of the semiconductor industry's tightest duopolies. Globally, only Stella and privately-held Morita Chemical Industries can produce twelve-nine purity (99.9999999999%) hydrofluoric acid — the grade required for etching sub-7nm logic, 3D NAND vertical channels, and EUV mask cleaning. Together they supply 90%+ of Japanese domestic HF demand and dominate the highest-purity tier globally. The global electronic-grade HF market ($1.39B in 2025, projected $1.87B by 2030 at 6.0% CAGR) has fewer than 15 capable producers, with the top 5 controlling ~70% of supply. Stella achieves a perfect moat score (B=25/25): monopoly-grade market share, extreme switching costs (requalification of ultra-pure chemicals takes 12-18 months per fab), and a century of fluorine chemistry know-how that cannot be replicated quickly.\n\nGEOPOLITICAL LEVERAGE: Japan's July 2019 export restrictions on HF, photoresist, and fluorinated polyimide to South Korea demonstrated the strategic weaponization potential of this supply chain. Samsung and SK Hynix were unable to find alternative 12-nine HF sources and were forced into rapid diversification programs that took years. This episode permanently elevated Stella's strategic visibility and underscored the irreplaceability of Japanese ultra-high-purity chemicals.\n\nCLIENT BASE & REVENUE STRUCTURE: Stella supplies virtually every major semiconductor fab globally: TSMC, Samsung, Intel, SK Hynix, Micron, Kioxia, SMIC, Hua Hong, UMC, and GlobalFoundries (10 fabs mapped in the supply chain graph). Semiconductor chemicals account for 57.8% of revenue, with the balance split between energy/battery materials (~15%, growing fastest), optical/general chemicals, and a transportation subsidiary. Two named major customers — Maruzen Chemicals (130-year-old Osaka chemical distributor) and Mitsubishi Chemical (buys LiPF6 for Li-ion battery electrolyte) — are disclosed in securities filings. Overseas sales represent 58% of revenue, providing geographic diversification across Korea, Taiwan, Singapore, and the USA.\n\nBATTERY OPTIONALITY: Beyond semiconductors, Stella manufactures LiPF6 (lithium hexafluorophosphate), the critical electrolyte salt in Li-ion batteries. The supply chain runs: Stella (LiPF6) → Mitsubishi Chemical (Sol-Rite electrolyte formulation) → Panasonic (battery cells) → Tesla/EV OEMs. This creates optionality on the EV mega-trend without requiring separate capex. The energy segment (~15% of revenue) roughly doubled in FY2025/3 and is the fastest-growing division. Quzhou BDX, Stella's Chinese subsidiary in Zhejiang, manufactures LiPF6 locally. Chinese competitor Do-Fluoride (002407.SZ) also produces LiPF6, making this a directly contested market.\n\nADDITIONAL BUSINESSES: Stella is Japan's sole manufacturer of BF3 (boron trifluoride) gas for organic synthesis. Its enriched boron-10 technology serves nuclear fuel storage and, via subsidiary Stella Pharma, enables BNCT (Boron Neutron Capture Therapy) cancer treatment — a novel oncology modality. These are small but demonstrate deep fluorine chemistry capabilities.\n\nFINANCIAL PROFILE: FY2025/3 showed strong recovery: revenue 36.29B JPY (+19.2% YoY), operating profit 4.34B JPY (+59.4%). ROE recovered to 6.5% from 0.3% (depressed by a one-time 2.3B JPY impairment charge in FY2024/3). The 4th Medium-Term Management Plan targets ROE of 8%+ by FY2028/3 and a total shareholder return ratio of 100%+ over three years (dividends + buybacks). Dividend yield stands at 3.21% — generous for a materials company. Balance sheet is clean with PBR of 1.39x (essentially at G2 peer median of 1.32x). Q3 FY2026/3 operating profit progress rate of 88.9% strongly suggests conservative full-year guidance is ripe for upward revision, as analyst consensus EPS (260.85 JPY) significantly exceeds company guidance (228.5 JPY).\n\nVALUATION CONCERN: The stock has rallied +42% over the past year (from 3,130 to 5,290), reducing the valuation case materially. PER at 21.62x now sits at a 27% premium to the G2 Materials peer median (17.0x), reflecting the market's belated recognition of the moat. PBR at 1.39x is roughly at parity with peers. Earnings yield spread of 3.1% over JGBs is modest. The stock currently trades above the sole analyst's target of 4,800 JPY.\n\nCATALYSTS: (1) Foreign ownership gap — at 25.9% vs an expected 45%+ for a monopoly-grade business with perfect moat scores, there is ~19pp of potential institutional buying as global funds discover this name. (2) Guidance revision — Q3 progress rate virtually guarantees an upward revision of FY2026 guidance, likely accompanied by a dividend increase. (3) Global fab buildout — TSMC Arizona/Kumamoto/Dresden, Intel Ohio/Germany, Samsung Taylor TX, Rapidus Chitose, and Micron Hiroshima expansion all drive incremental HF demand. (4) EV battery electrolyte growth via LiPF6.\n\nRISKS: (1) Chinese EG-HF producers, particularly Do-Fluoride New Materials (002407.SZ), have reached UP-SSS (G5) grade — the highest purity level — threatening the Stella/Morita duopoly in the medium term. (2) Raw material dependency: fluorite (CaF2) sourcing is 60%+ from China; while Stella has diversified to Europe and Mexico, Chinese export restrictions on fluorite could disrupt supply. (3) ROE of 6.5% remains below the company's own cost of equity (7-8%), indicating the business is not yet earning its hurdle rate. (4) Only 1 sell-side analyst covers the stock, creating an information gap and potentially thin liquidity during corrections. (5) Yen appreciation would compress overseas earnings (58% of sales are international).\n\nCONCLUSION: Stella Chemifa is a 'moat first, valuation second' story. The B=25/25 score reflects genuine irreplaceability — this is one of only two companies on Earth that can make the highest-purity HF. However, the market has partially caught up: at 21.6x PER, this is no longer cheap on a trailing basis. The investment case now rests on (a) the foreign ownership gap as a structural catalyst, (b) upcoming guidance revisions, (c) the secular tailwind from global fab expansion, and (d) LiPF6 battery optionality. Position sizing should reflect the elevated valuation and the emerging Chinese competitive threat. Suitable for a medium-conviction position with entry on dips below 4,800 JPY (analyst target) or on confirmation of FY2026 guidance revision. [Score: 60.5/100 | Confidence: High — 100% data coverage]", "marketCapInYen": 68630000000, "latestPriceYen": 5290, "weekHigh52": 5940, "weekLow52": 3130, "PER": 21.62, "forwardPER": 20.3, "PBR": 1.39, "EPS": 244.83, "ROE": 6.5, "dividendYield": 3.21, "revenueGrowth": 19.2, "OPM": 12.0, "foreignOwnership": 25.93, "chinaRevenue": 15, "hasBuyback": true, "analystBuy": 1, "analystHold": 0, "analystSell": 0, "forexSensitive": true, "suppliers": [], "clients": [{"id": "CMP-0017", "name": "TSMC", "label": "HF etchant"}, {"id": "CMP-0018", "name": "Samsung Electronics", "label": "HF etchant"}, {"id": "CMP-0019", "name": "Intel", "label": ""}, {"id": "CMP-0020", "name": "SK Hynix", "label": ""}, {"id": "CMP-0021", "name": "Micron", "label": ""}, {"id": "CMP-0014", "name": "Kioxia Holdings", "label": ""}, {"id": "CMP-0066", "name": "SMIC", "label": ""}, {"id": "CMP-0070", "name": "Hua Hong Semiconductor", "label": ""}, {"id": "CMP-0102", "name": "United Microelectronics Corporation", "label": ""}, {"id": "CMP-0106", "name": "GlobalFoundries Inc.", "label": ""}], "competitors": [], "partners": [], "ecosystem": []}, "CMP-0045": {"id": "CMP-0045", "name": "Kanto Denka Kogyo", "ticker": "4047.T", "country": "Japan", "industry": "Semiconductor Materials", "wave": 3, "website": "https://www.kantodenka.co.jp/", "description": "Major specialty gas manufacturer for semiconductor etching and cleaning. Produces 15+ types of fluorine-based specialty gases. Furukawa Group company.",  (Tosoh owns ~44%). Also serves pharmaceutical, power, food & beverage industries. Operates ~100 semiconductor UPW plants across 8 countries. Revenue FY03/25: 163.3B JPY. FY03/26 guidance: 175B JPY. Founded 1946.", "finalScore": 60.0, "rawComposite": 60.0, "confidence": "High", "confidenceMult": 1.0, "dataCoverage": 100.0, "researchComplete": 100.0, "dims": {"A": {"score": 10.0, "max": 30, "subs": {"A1_PER_discount": 6, "A3_PBR_discount": 0, "A4_earningsYield": 2}, "note": "PER 27.1 vs G1 median 31.59 (0.86x, modest discount); PBR 5.85 vs 2.49 (2.35x, extreme premium); EY spread 2.2%. Stock rallied +134% in 1yr. Scored 3/4; pro-rata rescaled to 30"}, "B": {"score": 24, "max": 25, "subs": {"B1_marketShare": 10, "B2_switchingCosts": 5, "B3_techDiff": 4, "B4_chainCentrality": 5}, "note": "70-80% of TSMC water treatment plants, 100% for <=10nm nodes. ~100 UPW plants across 8 countries. #2 global semi UPW (20-30% share). TSMC 2024 Excellent Performance Award. Critical bottleneck — UPW quality directly determines chip yield"}, "C": {"score": 11.0, "max": 15, "subs": {"C1_revenueGrowth": 2, "C2_operatingMargin": 3, "C3_ROE": 3, "C4_AIexposure": 3}, "note": "Revenue +8.6%. OPM 19.1% vs G1 14.9% (1.28x). ROE 21.7% (nearly 3x industry avg 7.6%). FY2026 guidance: orders 185B (+22.3%), revenue 175B (+7.2%), OP 36B (+15.7%)"}, "D": {"score": 7.0, "max": 10, "subs": {"D1_foreignOwnershipGap": 5, "D2_floatDynamics": 2, "D3_priceVs52W": 0}, "note": "Foreign ownership 22.5% vs expected 45% for B>=18 (gap 22.5pp). Tosoh holds 44% → free float only 54%. No confirmed buyback. Near 52W high (98%)"}, "E": {"score": 7.0, "max": 10, "subs": {"E1_analystConsensus": 1, "E2_capacityExpansion": 3, "E3_policyTailwinds": 3}, "note": "2 Buy, target 16,250 vs price 16,620 (stock exceeded target). Massive capacity expansion: TSMC Kumamoto/Arizona/Dresden, Rapidus 2nm fab (Organo will own/operate UPW plant). Japan semi policy support"}, "F": {"score": 1, "max": 10, "subs": {"F1_forexSensitivity": 1, "F2_customerConcentration": 0, "F3_geopoliticalRisk": 0}, "note": "TSMC = 14% of revenue but 70-80% of semiconductor UPW business. Deep Taiwan/China exposure (29.7% Greater China). Geopolitical risk: TSMC concentration + China revenue"}}, "investmentThesis": "STRUCTURAL MOAT — THE TSMC LOCK-IN: Organo Corporation holds one of the most extraordinary customer lock-ins in the semiconductor supply chain: 100% of TSMC's ultrapure water (UPW) plants for wafers at 10nm and below are built and operated by Organo. Across all TSMC nodes, Organo has 70-80% share of TSMC's water treatment installations. Ultrapure water is not a commodity — at the cutting edge, semiconductor-grade UPW cannot contain impurities beyond 1 part per trillion (10^12). Any contamination in UPW systems directly destroys chip yields, making this a mission-critical, zero-tolerance application. TSMC recognized Organo with its 2024 Excellent Performance Award, underscoring the depth of this partnership. Organo operates approximately 100 semiconductor UPW plants across 8 countries, making it the world's #2 semiconductor UPW provider with 20-30% global market share (behind Kurita Water at 35-45%, ahead of Nomura Micro Science at 10-15%). The top 3 combined control 80%+ of the global market.\n\nGROWTH FLYWHEEL — TSMC GLOBAL EXPANSION: The investment thesis hinges on a powerful flywheel: every new TSMC fab anywhere in the world generates near-automatic revenue for Organo. Current expansion projects include: (1) TSMC JASM Kumamoto, Japan — Phase 1 operational December 2024, Phase 2 by end 2027; (2) TSMC Arizona, USA — Organo USA Inc. (established 2021) opened an Arizona office specifically to serve this project and prospect other US semiconductor customers; (3) TSMC ESMC Dresden, Germany — Organo executing water treatment projects for TSMC's European expansion. Each advanced fab requires a bespoke UPW system costing hundreds of millions of yen, with a 1.5-2 year lead time and ongoing service contracts thereafter. FY2026/3 orders guidance of 185B JPY (+22.3% YoY) directly reflects this pipeline.\n\nRAPIDUS — THE NEXT FRONTIER: Organo has secured the water purification contract for Rapidus, Japan's national champion for 2nm-class chip manufacturing at its Chitose, Hokkaido fab. Uniquely, Organo will not just build but also own and operate the UPW facility at the Rapidus site — a recurring-revenue model that locks in long-term cash flows beyond one-time project revenue. This build-own-operate approach represents a strategic evolution toward higher-margin, annuity-like revenue streams.\n\nCOMPETITIVE LANDSCAPE: Kurita Water Industries (6370.T) is the #1 global semiconductor UPW provider by revenue (35-45% share) and is the dominant competitor. Kurita is stronger in standardized equipment and aggressive pricing, with deeper penetration in North America and Europe. However, Organo's advantage is relationship depth with TSMC — Kurita has not been able to displace Organo at advanced TSMC nodes. Nomura Micro Science (6254.T) holds 10-15% global share and is strong in Korea (Samsung is its main customer). The Samsung relationship is with Nomura, not Organo — a critical nuance. The competitive landscape shifted in December 2025 when Ecolab (ECL) acquired Ovivo's Electronics UPW business for $1.8B, creating a new major US-based competitor with ~$500M in semiconductor UPW revenue. Xylem acquired Evoqua for $7.5B in 2023, adding another well-resourced Western competitor. Veolia (France) co-dominates the broader global UPW market.\n\nCHINA EXPOSURE & GEOGRAPHIC MIX: Revenue breakdown is Japan 60.3%, Taiwan 17.1% (JPY 27.9B), China 12.6%, rest-of-world 10%. Greater China exposure totals ~30% when including Taiwan. Chinese clients likely include SMIC and Hua Hong Semiconductor (China's #1 and #2 foundries). While China revenue provides growth, it also introduces geopolitical risk — potential US-led export controls on semiconductor equipment could indirectly affect UPW system sales to Chinese fabs.\n\nFINANCIAL PROFILE: FY2025/3 delivered strong results: revenue 163.3B JPY (+8.6% YoY), operating profit 31.1B JPY (+38.0% YoY). Operating margin of 19.1% significantly exceeds the G1 Equipment peer median of 14.9% (1.28x), reflecting the high-value nature of UPW systems. ROE stands at an impressive 21.7% — nearly 3x the G1 peer average of 7.6% — indicating exceptional capital efficiency. FY2026/3 guidance calls for revenue of 175B JPY (+7.2%), operating profit of 36B JPY (+15.7%), and net income of 27B JPY. The relatively moderate revenue growth guidance masks the underlying strength: project revenue recognition follows percentage-of-completion accounting with 1.5-2 year lead times, meaning today's order surge (185B JPY projected orders) will flow through revenue over the next 2-3 years.\n\nSERVICE & SOLUTIONS — RECURRING REVENUE EVOLUTION: Beyond one-time project construction, Organo is strategically growing its service and solutions business (maintenance, chemical supply, operational support for existing UPW plants). With ~100 semiconductor UPW plants under its belt, each requiring ongoing water treatment chemicals, membrane replacement, and system optimization, this recurring revenue base provides earnings stability and margin expansion potential. The Rapidus build-own-operate model is the logical extension of this strategy.\n\nOWNERSHIP STRUCTURE & FLOAT: Tosoh Corporation (4042.T), a major chemical company, has held a ~44% stake in Organo since 1955. This parent relationship provides strategic benefits (Tosoh produces ion exchange resins via Tosoh Bioscience) but limits free float to approximately 54%. Foreign ownership at 22.5% is well below the expected ~45% for a company with near-maximum moat scores (B=24/25), suggesting significant potential for institutional buying as global investors discover this TSMC-linked play.\n\nVALUATION CONCERN: The market has aggressively re-rated Organo. The stock has rallied +134% over the past year (from ~7,100 to 16,620 JPY, touching an all-time high of 16,950). PBR at 5.85x is an extreme premium — 2.35x the G1 Equipment peer median of 2.49x. This makes Organo the most expensive stock by PBR in the G1 peer group. PER at 27.1x still offers a modest 14% discount to the G1 median of 31.59x, but this is cold comfort given the PBR stretched valuation. Dividend yield at 1.14% is minimal. The stock trades at 98% of its 52-week high, and both analysts covering the stock have Buy ratings but with an average target of 16,250 JPY — below the current price. The valuation case has substantially deteriorated.\n\nCATALYSTS: (1) Foreign ownership gap — at 22.5% vs expected 45%+, there is ~22.5pp of potential institutional buying as global semiconductor fund managers recognize Organo as a pure-play TSMC proxy. This is the strongest near-term catalyst. (2) TSMC fab ramp-up — revenue from Kumamoto Phase 2, Arizona, and Dresden will flow through over 2026-2028. (3) Rapidus build-own-operate model — if successful, could be replicated at future fab projects, transforming the revenue profile toward higher-margin recurring streams. (4) Japan semiconductor policy support — government subsidies for domestic fab construction directly benefit Organo's pipeline. (5) AI-driven semiconductor capex boom — every AI accelerator chip (NVIDIA, AMD, custom ASICs) requires advanced fab capacity, which requires Organo's UPW systems.\n\nRISKS: (1) TSMC concentration — while TSMC is only 14% of total revenue, it represents 70-80% of semiconductor UPW business. A deterioration in the TSMC relationship would be catastrophic. (2) Tosoh parent control — with 44% ownership, Tosoh controls corporate governance; minority shareholders have limited influence. Tosoh has no current plans to divest, but the concentrated ownership suppresses float and could limit shareholder-friendly capital allocation. (3) Geopolitical exposure — 29.7% of revenue from Greater China (Taiwan + mainland) is at risk from escalating US-China tensions, potential Taiwan Strait disruption, or expanded semiconductor equipment export controls. (4) Kurita competitive threat — Kurita is larger, better-capitalized, and more globally diversified; if TSMC sought to reduce supplier concentration, Kurita would be the primary beneficiary. (5) Stretched valuation — at 5.85x PBR and near all-time highs, any earnings miss or guidance disappointment could trigger sharp corrections. (6) Forex sensitivity — international expansion increases USD/JPY and TWD/JPY exposure.\n\nCONCLUSION: Organo is the definitive 'TSMC infrastructure play' — owning 100% of TSMC's advanced-node UPW installations creates a competitive position that is effectively unassailable at existing fabs and self-reinforcing at new ones. The B=24/25 moat score, 19.1% operating margin, and 21.7% ROE reflect a genuinely superior business. However, the market has fully discovered and re-priced this story: at 5.85x PBR and +134% YoY appreciation, the stock has run well ahead of near-term fundamentals. The foreign ownership gap (22.5% vs expected 45%) remains the strongest catalyst, suggesting further institutional accumulation. This is a 'right company, expensive price' situation. Suitable for a watchlist position with entry on meaningful corrections (target entry below 13,000 JPY / 4x PBR), or as a small position for investors willing to pay up for what is arguably the most defensible TSMC supply chain position outside of ASML. Long-term investors should focus on the 185B JPY order pipeline, which ensures revenue visibility through FY2028. [Score: 60.0/100 | Confidence: High — 100% data coverage]", "marketCapInYen": 770000000000, "latestPriceYen": 16620, "weekHigh52": 16950, "weekLow52": 4770, "PER": 27.1, "forwardPER": 25.0, "PBR": 5.85, "EPS": 613.06, "ROE": 21.7, "dividendYield": 1.14, "revenueGrowth": 8.6, "OPM": 19.1, "foreignOwnership": 22.5, "chinaRevenue": 12.6, "hasBuyback": false, "analystBuy": 2, "analystHold": 0, "analystSell": 0, "forexSensitive": tru const COUNTRY_CLR  = {"Japan": "#ef4444", "USA": "#3b82f6", "South Korea": "#22c55e", "Taiwan": "#f59e0b", "China": "#f97316", "Hong Kong": "#06b6d4", "Netherlands": "#8b5cf6", "Unknown": "#6b7280"};

const WAVE_LABELS = {1:"Wave 1 – JP seed",2:"Wave 2 – Global",3:"Wave 3 – JP vendors",
                      4:"Wave 4 – OSAT/Foundry",5:"Wave 5 – Korea",6:"Wave 6 – China"};
const EDGE_CLR = {supplier:"#334155",competitor:"#7c3aed",partner:"#0e7490",ecosystem:"#065f46"};

// ── Build filters ────────────────────────────────────────────────────
const countries = [...new Set(NODES_DATA.map(n=>n.country))].sort();
const countryDiv = document.getElementById('country-filters');
countries.forEach(c => {
  const div = document.createElement('div'); div.className='filter-row';
  div.innerHTML = `<input type="checkbox" id="c-${c}" checked>
    <div class="dot" style="background:${COUNTRY_CLR[c]||'#6b7280'}"></div>
    <label for="c-${c}">${c}</label>`;
  countryDiv.appendChild(div);
});

const waves = [...new Set(NODES_DATA.map(n=>n.wave))].sort((a,b)=>a-b);
const waveDiv = document.getElementById('wave-filters');
waves.forEach(w => {
  const div = document.createElement('div'); div.className='filter-row';
  div.innerHTML = `<input type="checkbox" id="w-${w}" checked>
    <label for="w-${w}">${WAVE_LABELS[w]||'Wave '+w}</label>`;
  waveDiv.appendChild(div);
});

// ── D3 setup ─────────────────────────────────────────────────────────
const svg = d3.select('#svg');
const container = document.getElementById('graph');
let W = container.clientWidth, H = container.clientHeight;
const g = svg.append('g');

// ── Arrow markers ─────────────────────────────────────────────────────────
const defs = svg.append('defs');
function mkArrow(id, color, sz) {
  defs.append('marker')
    .attr('id', id).attr('viewBox','0 -4 8 8').attr('refX',8).attr('refY',0)
    .attr('markerWidth', sz||5).attr('markerHeight', sz||5).attr('orient','auto')
    .append('path').attr('d','M0,-4L8,0L0,4').attr('fill', color);
}
mkArrow('arr-supp',   '#55677e', 5);   // default supplier edge (subtle)
mkArrow('arr-hl-out', '#22c55e', 8);   // hover: hovered node is the supplier
mkArrow('arr-hl-in',  '#f59e0b', 8);   // hover: hovered node is the customer

svg.attr('width', W).attr('height', H);

const zoom = d3.zoom().scaleExtent([0.05, 6])
  .on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom);

const edgeLayer = g.append('g').attr('class','edges');
const nodeLayer = g.append('g').attr('class','nodes');

// ── Simulation ────────────────────────────────────────────────────────
const sim = d3.forceSimulation()
  .force('link', d3.forceLink().id(d=>d.id).distance(80).strength(0.4))
  .force('charge', d3.forceManyBody().strength(-280))
  .force('center', d3.forceCenter(W/2, H/2))
  .force('x', d3.forceX(W/2).strength(0.04))
  .force('y', d3.forceY(H/2).strength(0.04))
  .force('collision', d3.forceCollide().radius(d => (d.deep?22:(d.crit?18:12))+4));

// ── State ─────────────────────────────────────────────────────────────
let activeCid = null;
let nodeById = {};
let linkSel, nodeSel;

function getActiveCountries() {
  return new Set(countries.filter(c=>{
    const el = document.getElementById('c-'+c);
    return el && el.checked;
  }));
}
function getActiveWaves() {
  return new Set(waves.filter(w=>{
    const el = document.getElementById('w-'+w);
    return el && el.checked;
  }));
}
function getActiveEdgeTypes() {
  const types = [];
  if (document.getElementById('e-supplier').checked) types.push('supplier');
  if (document.getElementById('e-competitor').checked) types.push('competitor');
  if (document.getElementById('e-partner').checked) types.push('partner');
  if (document.getElementById('e-ecosystem').checked) types.push('ecosystem');
  return new Set(types);
}

function render() {
  const ac = getActiveCountries();
  const aw = getActiveWaves();
  const ae = getActiveEdgeTypes();

  const visNodes = NODES_DATA.filter(n => ac.has(n.country) && aw.has(n.wave));
  const visIds = new Set(visNodes.map(n=>n.id));
  const visEdges = EDGES_DATA.filter(e => visIds.has(e.source.id||e.source) && visIds.has(e.target.id||e.target) && ae.has(e.type));

  nodeById = {};
  visNodes.forEach(n => nodeById[n.id] = n);

  document.getElementById('stat-nodes').textContent = `Nodes: ${NODES_DATA.length}`;
  document.getElementById('stat-edges').textContent = `Edges: ${EDGES_DATA.length}`;
  document.getElementById('stat-visible').textContent = `Visible: ${visNodes.length} nodes, ${visEdges.length} edges`;

  // edges
  linkSel = edgeLayer.selectAll('path.edge').data(visEdges, d=>`${d.source.id||d.source}-${d.target.id||d.target}-${d.type}`);
  linkSel.exit().remove();
  const linkEnter = linkSel.enter().append('path').attr('class','edge')
    .attr('fill','none')
    .attr('stroke-width', d => d.type==='supplier'?1.5:1.5)
    .attr('stroke-opacity', d => d.type==='supplier'?0.3:0.5)
    .attr('stroke-dasharray', d => d.type!=='supplier'?'4,3':null)
    .attr('marker-end', d => d.type==='supplier'?'url(#arr-supp)':null);
  linkSel = linkEnter.merge(linkSel)
    .attr('stroke', d => EDGE_CLR[d.type]||'#334155');

  // nodes
  nodeSel = nodeLayer.selectAll('g.node').data(visNodes, d=>d.id);
  nodeSel.exit().remove();
  const nodeEnter = nodeSel.enter().append('g').attr('class','node').style('cursor','pointer');

  // outer ring (score color)
  nodeEnter.append('circle').attr('class','ring-circle');
  // inner fill
  nodeEnter.append('circle').attr('class','fill-circle');
  // label
  nodeEnter.append('text').attr('class','node-label')
    .attr('text-anchor','middle').attr('dy','0.35em')
    .attr('pointer-events','none').style('user-select','none');

  nodeSel = nodeEnter.merge(nodeSel);

  nodeSel.select('.ring-circle')
    .attr('r', d => (d.deep?20:(d.crit?17:11))+2)
    .attr('fill','transparent')
    .attr('stroke', d => d.ring)
    .attr('stroke-width', d => d.deep?3.5:(d.crit?3:2));

  nodeSel.select('.fill-circle')
    .attr('r', d => d.deep?20:(d.crit?17:11))
    .attr('fill', d => COUNTRY_CLR[d.country]||'#6b7280')
    .attr('stroke', d => d.id===activeCid?'#fff':'none')
    .attr('stroke-width',3);

  nodeSel.select('.node-label')
    .attr('font-size', d => d.deep?8:(d.crit?7:6))
    .attr('font-weight', d => d.deep?700:'normal')
    .attr('fill', d => d.deep?'#f59e0b':'#fff')
    .attr('dy', d => (d.deep?20:(d.crit?17:11))+10)
    .text(d => d.deep?d.name:(d.ticker||d.name.split(' ')[0]));

  // interactions
  nodeSel
    .on('mouseover', (event,d) => { showTooltip(event,d); highlightEdges(d); })
    .on('mousemove', (event) => moveTooltip(event))
    .on('mouseout', (event,d) => { hideTooltip(); unhighlightEdges(); })
    .on('click', (event,d) => { event.stopPropagation(); togglePanel(d.id); })
    .call(d3.drag()
      .on('start', (event,d) => { if(!event.active) sim.alphaTarget(.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag',  (event,d) => { d.fx=event.x; d.fy=event.y; })
      .on('end',   (event,d) => { if(!event.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
    );

  svg.on('click', () => closePanel());

  sim.nodes(visNodes);
  sim.force('link').links(visEdges);
  sim.alpha(.8).restart();
  sim.on('tick', ticked);
}

function ticked() {
  if (linkSel) linkSel.attr('d', d => {
    const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    const sr = (d.source.deep ? 20 : d.source.crit ? 17 : 11) + 2;
    const tr = (d.target.deep ? 20 : d.target.crit ? 17 : 11) + 2;
    const x1 = d.source.x + dx/dist * sr, y1 = d.source.y + dy/dist * sr;
    const x2 = d.target.x - dx/dist * tr, y2 = d.target.y - dy/dist * tr;
    return `M${x1.toFixed(2)},${y1.toFixed(2)}L${x2.toFixed(2)},${y2.toFixed(2)}`;
  });
  if (nodeSel) nodeSel
    .attr('transform', d=>`translate(${d.x},${d.y})`);
}

// ── Edge hover highlighting ──────────────────────────────────────────────
function highlightEdges(d) {
  if (!linkSel) return;
  const hid = d.id;
  linkSel
    .attr('stroke-opacity', e => {
      const sid = e.source.id||e.source, tid = e.target.id||e.target;
      return (sid===hid||tid===hid) ? 1 : 0.04;
    })
    .attr('stroke', e => {
      const sid = e.source.id||e.source, tid = e.target.id||e.target;
      if (e.type==='supplier') {
        if (sid===hid) return '#22c55e';   // hovered node supplies to target
        if (tid===hid) return '#f59e0b';   // source supplies to hovered node
      }
      if (sid===hid||tid===hid) return EDGE_CLR[e.type]||'#334155';
      return EDGE_CLR[e.type]||'#334155';
    })
    .attr('stroke-width', e => {
      const sid = e.source.id||e.source, tid = e.target.id||e.target;
      return (sid===hid||tid===hid) ? 2.5 : 1.5;
    })
    .attr('marker-end', e => {
      if (e.type!=='supplier') return null;
      const sid = e.source.id||e.source, tid = e.target.id||e.target;
      if (sid===hid) return 'url(#arr-hl-out)';
      if (tid===hid) return 'url(#arr-hl-in)';
      return null;
    });
  if (nodeSel) nodeSel.style('opacity', n => {
    if (n.id===hid) return 1;
    const conn = linkSel.data().some(e => {
      const sid = e.source.id||e.source, tid = e.target.id||e.target;
      return (sid===hid&&tid===n.id)||(tid===hid&&sid===n.id);
    });
    return conn ? 1 : 0.2;
  });
}

function unhighlightEdges() {
  if (!linkSel) return;
  linkSel
    .attr('stroke-opacity', e => e.type==='supplier'?0.3:0.5)
    .attr('stroke', e => EDGE_CLR[e.type]||'#334155')
    .attr('stroke-width', () => 1.5)
    .attr('marker-end', e => e.type==='supplier'?'url(#arr-supp)':null);
  if (nodeSel) nodeSel.style('opacity', 1);
}

// ── Tooltip ───────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
function showTooltip(event, d) {
  const sc = d.score!=null ? `<div class="tt-score" style="color:${d.ring}">${d.score.toFixed(1)}</div>` : '';
  const per = d.per!=null ? `<div class="tt-row"><span class="tt-key">PER</span><span class="tt-val">${d.per.toFixed(1)}x</span></div>` : '';
  const fo  = d.fo!=null  ? `<div class="tt-row"><span class="tt-key">Foreign own.</span><span class="tt-val">${d.fo.toFixed(1)}%</span></div>` : '';
  tooltip.innerHTML = `
    <div class="tt-name">${d.name}</div>
    <div class="tt-row"><span class="tt-key">Ticker</span><span class="tt-val">${d.ticker||'—'}</span></div>
    <div class="tt-row"><span class="tt-key">Country</span><span class="tt-val">${d.country}</span></div>
    ${sc}${per}${fo}
    <div class="tt-hint">Click to open investment card</div>`;
  tooltip.style.opacity = '1';
  moveTooltip(event);
}
function moveTooltip(event) {
  const r = container.getBoundingClientRect();
  let x = event.clientX - r.left + 14;
  let y = event.clientY - r.top + 14;
  if (x + 250 > W) x -= 270;
  tooltip.style.left = x+'px';
  tooltip.style.top  = y+'px';
}
function hideTooltip() { tooltip.style.opacity='0'; }

// ── Investment card panel ─────────────────────────────────────────────
const panel = document.getElementById('detail-panel');
document.getElementById('dp-close').addEventListener('click', e => { e.stopPropagation(); closePanel(); });

function togglePanel(cid) {
  if (activeCid === cid) { closePanel(); return; }
  activeCid = cid;
  populateCard(DETAIL_MAP[cid]);
  panel.classList.add('open');
  // highlight node
  nodeSel && nodeSel.select('.fill-circle')
    .attr('stroke', d => d.id===cid?'#fff':'none');
}

function closePanel() {
  activeCid = null;
  panel.classList.remove('open');
  nodeSel && nodeSel.select('.fill-circle').attr('stroke','none');
}

function goToNode(cid) {
  const nd = nodeById[cid];
  if (!nd) return;
  const scale = 2.2;
  const tx = W/2 - scale*nd.x;
  const ty = H/2 - scale*nd.y;
  svg.transition().duration(600)
    .call(zoom.transform, d3.zoomIdentity.translate(tx,ty).scale(scale));
  togglePanel(cid);
}

function fmt(v, suffix='', dp=1) {
  if (v==null) return '—';
  return (+v).toFixed(dp) + suffix;
}
function fmtCap(v) {
  if (v==null) return '—';
  if (v>=1e12) return (v/1e12).toFixed(2)+'T ¥';
  if (v>=1e9)  return (v/1e9).toFixed(1)+'B ¥';
  return (v/1e6).toFixed(0)+'M ¥';
}
function confClass(label) {
  if (!label) return '';
  const l = label.toLowerCase();
  if (l.includes('very low')) return 'conf-vlow';
  if (l.includes('low'))      return 'conf-low';
  if (l.includes('medium')||l.includes('med')) return 'conf-med';
  if (l.includes('high'))     return 'conf-high';
  return '';
}

function scGroup(title, arr) {
  if (!arr || !arr.length) return '';
  const chips = arr.map(x =>
    `<span class="sc-chip" data-goto="${x.id}" title="${x.label||x.name}">${x.name}</span>`
  ).join('');
  return `<div class="sc-group">
    <div class="sc-group-label">${title} (${arr.length})</div>
    <div class="sc-list">${chips}</div>
  </div>`;
}

function populateCard(d) {
  if (!d) { document.getElementById('dp-body').innerHTML='<div style="padding:20px;color:#475569">No data</div>'; return; }

  document.getElementById('dp-name').textContent = d.name;
  document.getElementById('dp-sub').textContent =
    [d.ticker, d.country, d.industry, 'Wave '+d.wave].filter(Boolean).join(' · ');

  // ── Score section ──
  const score = d.finalScore;
  const ringClr = score==null?'#6b7280':score>=62?'#f59e0b':score>=55?'#22c55e':score>=45?'#3b82f6':'#6b7280';
  const pct = score==null?0:Math.min(100,score);

  const DIM_META = {
    A:{label:'Valuation', max:30}, B:{label:'Moat', max:25},
    C:{label:'Growth',    max:15}, D:{label:'Ownership', max:10},
    E:{label:'Catalysts', max:10}, F:{label:'Risk', max:10}
  };
  const SUB_LABELS = {
    A1_PER_discount:'PER Discount', A2_fwdPER_discount:'Fwd PER', A3_PBR_discount:'PBR Disc.',
    A4_earningsYield:'Earn. Yield',
    B1_marketShare:'Mkt Share', B2_switchingCosts:'Switch. Costs',
    B3_techDiff:'Tech Diff.', B4_chainCentrality:'Chain Cent.',
    C1_revenueGrowth:'Rev. Growth', C2_operatingMargin:'Op. Margin',
    C3_ROE:'ROE', C4_AIexposure:'AI Exposure',
    D1_foreignOwnershipGap:'Foreign Own. Gap', D2_floatDynamics:'Float Dyn.',
    D3_priceVs52W:'Price vs 52W',
    E1_analystConsensus:'Analyst Consens.', E2_capacityExpansion:'Capex Expan.',
    E3_policyTailwinds:'Policy Tailwinds',
    F1_forexSensitivity:'Forex Sensitiv.', F2_customerConcentration:'Cust. Concent.',
    F3_geopoliticalRisk:'Geo. Risk'
  };

  let dimHtml = '<div class="dim-grid">';
  for (const [k, meta] of Object.entries(DIM_META)) {
    const dim = d.dims[k] || {};
    const ds  = dim.score != null ? (+dim.score).toFixed(1) : '—';
    const barPct = dim.score != null ? Math.min(100, (dim.score / meta.max) * 100) : 0;
    const barClr = dim.score == null ? '#334155'
                 : barPct >= 70 ? '#22c55e' : barPct >= 40 ? '#3b82f6' : '#ef4444';
    const subs = dim.subs || {};
    const subRows = Object.entries(subs)
      .filter(([,v]) => v != null)
      .map(([k,v]) => `<div class="sub-row">
        <span class="sub-key">${SUB_LABELS[k]||k}</span>
        <span class="sub-val">${v}</span></div>`)
      .join('');
    dimHtml += `<div class="dim-cell" title="${dim.note||''}">
      <div class="dim-label">${k} · ${meta.label}</div>
      <div class="dim-score">${ds}<span class="dim-max">/${meta.max}</span></div>
      <div class="dim-bar-bg"><div class="dim-bar-fill" style="width:${barPct.toFixed(1)}%;background:${barClr}"></div></div>
      ${subRows ? `<div class="dim-subs">${subRows}</div>` : ''}
    </div>`;
  }
  dimHtml += '</div>';

  const confBadge = d.confidence
    ? `<span class="conf-badge ${confClass(d.confidence)}">${d.confidence}</span>` : '';

  const scoreHtml = `<div class="card-section">
    <h3>Investment Score</h3>
    <div class="score-bar-wrap">
      <div class="score-num" style="color:${ringClr}">${score!=null?score.toFixed(1):'—'}</div>
      <div class="score-meta">Raw composite: ${d.rawComposite!=null?d.rawComposite.toFixed(1):'—'} &nbsp;·&nbsp;
        Conf. mult.: ${d.confidenceMult!=null?d.confidenceMult.toFixed(2):'—'} &nbsp;·&nbsp;
        Data coverage: ${d.dataCoverage!=null?d.dataCoverage.toFixed(0)+'%':(d.researchComplete!=null?d.researchComplete.toFixed(0)+'%':'—')}</div>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${ringClr}"></div></div>
      ${confBadge}
    </div>
    ${dimHtml}
  </div>`;

  // ── Thesis ──
  const thesisHtml = d.investmentThesis ? `<div class="card-section">
    <h3>Investment Thesis</h3>
    <div class="thesis-text">${d.investmentThesis.replace(/\n/g,'<br>')}</div>
  </div>` : '';

  // ── Financials ──
  const rows = [
    ['Market cap',       fmtCap(d.marketCapInYen)],
    ['Price (¥)',        fmt(d.latestPriceYen,'',0)],
    ['52W High/Low (¥)', d.weekHigh52!=null&&d.weekLow52!=null ? fmt(d.weekHigh52,'',0)+' / '+fmt(d.weekLow52,'',0) : '—'],
    ['PER',              fmt(d.PER,'x')],
    ['Forward PER',      fmt(d.forwardPER,'x')],
    ['PBR',              fmt(d.PBR,'x')],
    ['EPS (¥)',          fmt(d.EPS,'',2)],
    ['ROE',              fmt(d.ROE,'%')],
    ['Revenue growth',   fmt(d.revenueGrowth,'%')],
    ['Op. margin',       fmt(d.OPM,'%')],
    ['Dividend yield',   fmt(d.dividendYield,'%')],
    ['Foreign ownership',fmt(d.foreignOwnership,'%')],
    ['China revenue',    fmt(d.chinaRevenue,'%')],
    ['Forex sensitive',  d.forexSensitive!=null?(d.forexSensitive?'Yes':'No'):'—'],
    ['Buyback active',   d.hasBuyback!=null?(d.hasBuyback?'Yes':'No'):'—'],
    ['Analyst Buy/Hold/Sell',
      (d.analystBuy!=null||d.analystHold!=null||d.analystSell!=null)
        ? [d.analystBuy,d.analystHold,d.analystSell].map(v=>v??'—').join(' / ')
        : '—'],
  ];
  const finRows = rows.map(([k,v]) =>
    `<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const finHtml = `<div class="card-section">
    <h3>Financial Data</h3>
    <table class="fin-table">${finRows}</table>
  </div>`;

  // ── Supply chain position ──
  const scHtml = `<div class="card-section">
    <h3>Supply Chain Position</h3>
    ${scGroup('Suppliers', d.suppliers)}
    ${scGroup('Clients', d.clients)}
    ${scGroup('Competitors', d.competitors)}
    ${scGroup('Partners', d.partners)}
    ${scGroup('Ecosystem', d.ecosystem)}
  </div>`;

  // ── Company profile ──
  const websiteLink = d.website
    ? `<a class="website-link" href="${d.website}" target="_blank">${d.website}</a>` : '';
  const profileHtml = `<div class="card-section">
    <h3>Company Profile</h3>
    ${websiteLink}
    <div class="desc-text">${d.description||''}</div>
  </div>`;

  document.getElementById('dp-body').innerHTML =
    scoreHtml + thesisHtml + finHtml + scHtml + profileHtml;

  // bind SC chip clicks
  document.querySelectorAll('#dp-body .sc-chip[data-goto]').forEach(chip => {
    chip.addEventListener('click', e => {
      e.stopPropagation();
      goToNode(chip.dataset.goto);
    });
  });
}

// ── Filter listeners ──────────────────────────────────────────────────
document.querySelectorAll('#country-filters input, #wave-filters input, #sidebar input[type=checkbox]')
  .forEach(el => el.addEventListener('change', render));

// ── Resize ────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  W = container.clientWidth; H = container.clientHeight;
  svg.attr('width', W).attr('height', H);
  sim.force('center', d3.forceCenter(W/2, H/2)).alpha(.3).restart();
});

// ── Init ─────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
